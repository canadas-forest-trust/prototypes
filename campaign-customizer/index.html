      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

      setStatus('Error: missing bundle data');

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);

            const ds = new DecompressionStream('gzip');

            const reader = ds.readable.getReader();

            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();

              chunks.push(value);

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');
      }

      old.replaceWith(s);

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;background:#E7E3D8;}\n  .cpx-root ::-webkit-scrollbar{width:10px;height:10px;}\n  .cpx-root ::-webkit-scrollbar-thumb{background:#D2CCBC;border-radius:0;}\n  .cpx-mono{font-family:'Space Mono',monospace;}\n  .cpx-prose h3{font-family:'Archivo',sans-serif;font-weight:700;font-size:22px;line-height:1.15;margin:0 0 10px;color:#17150F;letter-spacing:-0.01em;}\n  .cpx-prose p{margin:0 0 12px;font-size:16px;line-height:1.6;color:#3A352B;}\n  .cpx-prose a{color:#1B6A3E;text-decoration:underline;text-underline-offset:2px;}\n  .cpx-prose ul{margin:0 0 12px;padding-left:20px;}\n  .cpx-prose li{font-size:16px;line-height:1.6;color:#3A352B;margin-bottom:4px;}\n  .cpx-prose iframe,.cpx-prose video,.cpx-prose img{max-width:100%;border-radius:2px;display:block;}\n  .cpx-prose img{height:auto;}\n  [contenteditable]:focus{outline:none;}\n  .cpx-edit-area h3{font-family:'Archivo';font-weight:700;font-size:20px;margin:0 0 8px;}\n  .cpx-edit-area p{margin:0 0 10px;font-size:14px;line-height:1.55;}\n  @keyframes cpx-spin{to{transform:rotate(360deg);}}\n  @media (max-width:920px){\n    .cpx-shell{flex-direction:column !important;}\n    .cpx-controls{width:100% !important;border-right:none !important;border-bottom:1px solid #E2DDD0;max-height:none !important;}\n    .cpx-preview{width:100% !important;}\n    .cpx-tabs{display:flex !important;}\n    .cpx-shell.tab-edit .cpx-preview{display:none;}\n    .cpx-shell.tab-preview .cpx-controls{display:none;}\n    .cpx-breadcrumb{display:none !important;}\n  }\n  .cpx-shell.full .cpx-controls{display:none;}\n  .cpx-shell.full .cpx-preview{width:100% !important;}\n  @media (max-width:760px){\n    .cpx-page > div{padding-left:22px !important;padding-right:22px !important;}\n    .cpx-pay-grid{grid-template-columns:1fr !important;}\n    .cpx-preview{padding:0 !important;}\n    .cpx-page{border:none !important;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"cpx-root\" data-screen-label=\"Campaign Page Editor\" style=\"font-family:'Archivo',sans-serif;color:#17150F;background:#E7E3D8;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;\">\n\n  <!-- ===================== EDITOR TOP BAR ===================== -->\n  <header style=\"flex:none;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:#F7F5EF;border-bottom:1px solid #E2DDD0;z-index:30;\">\n    <div style=\"display:flex;align-items:center;gap:18px;min-width:0;\">\n      <div style=\"display:flex;align-items:center;gap:11px;\">\n        <div style=\"display:grid;grid-template-columns:repeat(5,3px);gap:2px;\">\n          <sc-for list=\"{{ cftDots }}\" as=\"d\" hint-placeholder-count=\"25\"><span style=\"width:3px;height:3px;border-radius:50%;background:#17150F;display:block;\"><\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n        <div class=\"cpx-mono\" style=\"font-size:10px;line-height:1.25;letter-spacing:0.1em;font-weight:700;text-transform:uppercase;\">Canada's<br>Forest Trust<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:26px;background:#D9D3C5;\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;\">\n        <svg width=\"32\" height=\"19\" viewBox=\"0 0 34 20\" fill=\"none\" stroke=\"#17150F\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><path d=\"M1 19 L7 4 L13 19\"><\u002Fpath><path d=\"M11 19 L17 4 L23 19\"><\u002Fpath><path d=\"M21 19 L27 4 L33 19\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-weight:700;font-size:15px;\">{{ partnerName }}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cpx-breadcrumb cpx-mono\" style=\"font-size:10.5px;letter-spacing:0.13em;text-transform:uppercase;color:#A39C8C;margin-left:6px;\">/&nbsp;&nbsp;Campaign Page&nbsp;&nbsp;·&nbsp;&nbsp;Editor<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px;\">\n      <button onclick=\"{{ openShare }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid #D9D3C5;color:#3A352B;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;padding:9px 14px;border-radius:2px;cursor:pointer;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"18\" cy=\"5\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"12\" r=\"3\"><\u002Fcircle><circle cx=\"18\" cy=\"19\" r=\"3\"><\u002Fcircle><path d=\"M8.6 13.5l6.8 4M15.4 6.5l-6.8 4\"><\u002Fpath><\u002Fsvg>Share<\u002Fbutton><button onclick=\"{{ toggleFull }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid #D9D3C5;color:#3A352B;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;padding:9px 14px;border-radius:2px;cursor:pointer;\">{{ fullLabel }}<\u002Fbutton>\n      \n      <button onclick=\"{{ onPublish }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:{{ publishBg }};border:1px solid {{ publishBg }};color:#F7F5EF;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;padding:10px 16px;border-radius:2px;cursor:pointer;\">{{ publishLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===================== SHARE MODAL ===================== -->\n  <sc-if value=\"{{ shareOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeShare }}\" style=\"position:fixed;inset:0;z-index:60;background:rgba(23,21,15,0.46);display:flex;align-items:center;justify-content:center;padding:20px;\">\n    <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:520px;background:#F7F5EF;border:1px solid #DAD4C6;border-radius:4px;box-shadow:0 24px 64px rgba(23,21,15,0.30);overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #E2DDD0;\">\n        <div>\n          <div class=\"cpx-mono\" style=\"font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#B46A3A;margin-bottom:6px;\">Share<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:800;font-size:22px;letter-spacing:-0.01em;line-height:1;\">Your campaign page<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeShare }}\" style=\"width:32px;height:32px;flex:none;border:1px solid #D9D3C5;background:#fff;border-radius:2px;cursor:pointer;font-size:17px;color:#5C574B;line-height:1;\">×<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"padding:22px 24px;\">\n        <!-- copy link -->\n        <div class=\"cpx-mono\" style=\"font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:#8C8676;margin-bottom:9px;\">Copy public link<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-bottom:24px;\">\n          <div style=\"flex: 1; display: flex; align-items: center; border: 1px solid #D9D3C5; border-radius: 2px; background: #fff; padding: 0 12px; min-width: 0; padding-top: 10px; padding-bottom: 10px\"><span style=\"font-family:'Space Mono',monospace;font-size:13px;color:#3A352B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ shareUrl }}<\u002Fspan><\u002Fdiv>\n          <button onclick=\"{{ copyLink }}\" title=\"{{ copyLinkTitle }}\" style=\"flex: none; display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; background: transparent; border: 1px solid #d9d3c5; color: {{ copyLinkIconColor }}; border-radius: 2px; cursor: pointer;\">{{ copyLinkIcon }}<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- embed -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;\">\n          <div class=\"cpx-mono\" style=\"font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:#8C8676;\">Embed<\u002Fdiv>\n          <button onclick=\"{{ copyEmbed }}\" style=\"display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid {{ copyEmbedBorder }};color:{{ copyEmbedColor }};font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:0.08em;text-transform:uppercase;padding:6px 11px;border-radius:2px;cursor:pointer;\">{{ copyEmbedLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #E2DDD0;border-radius:2px;background:#1B1B17;padding:14px 16px;\"><code style=\"font-family:'Space Mono',monospace;font-size:12px;line-height:1.6;color:#D8D3C4;white-space:pre-wrap;word-break:break-all;\">{{ embedCode }}<\u002Fcode><\u002Fdiv>\n        <div style=\"font-size:12px;color:#A39C8C;margin-top:10px;line-height:1.45;\">Paste this snippet into any website to display your live campaign page.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== MOBILE TABS ===================== -->\n  <div class=\"cpx-tabs\" style=\"display:none;flex:none;background:#F7F5EF;border-bottom:1px solid #E2DDD0;padding:8px 12px;gap:8px;\">\n    <button onclick=\"{{ showEdit }}\" style=\"flex:1;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:11px;border-radius:2px;cursor:pointer;border:1px solid {{ editTabBorder }};background:{{ editTabBg }};color:{{ editTabColor }};\">Edit<\u002Fbutton>\n    <button onclick=\"{{ showPreview }}\" style=\"flex:1;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:11px;border-radius:2px;cursor:pointer;border:1px solid {{ prevTabBorder }};background:{{ prevTabBg }};color:{{ prevTabColor }};\">Preview<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ===================== FUNDRAISER MODAL ===================== -->\n  <sc-if value=\"{{ fundraiserModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeFundraiserModal }}\" style=\"position:fixed;inset:0;z-index:60;background:rgba(23,21,15,0.46);display:flex;align-items:center;justify-content:center;padding:20px;\">\n    <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:500px;background:#F7F5EF;border:1px solid #DAD4C6;border-radius:4px;box-shadow:0 24px 64px rgba(23,21,15,0.30);overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #E2DDD0;\">\n        <div>\n          <div class=\"cpx-mono\" style=\"font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#B46A3A;margin-bottom:6px;\">About this feature<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:800;font-size:22px;letter-spacing:-0.01em;line-height:1;\">Make this a fundraiser<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeFundraiserModal }}\" style=\"width:32px;height:32px;flex:none;border:1px solid #D9D3C5;background:#fff;border-radius:2px;cursor:pointer;font-size:17px;color:#5C574B;line-height:1;\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:22px 24px;display:flex;flex-direction:column;gap:13px;\">\n        <p style=\"font-size:14.5px;line-height:1.65;color:#3A352B;margin:0;\">This feature is ideal for <strong>schools, sports teams, and community groups<\u002Fstrong> that want to sell trees as a fundraising product for their own initiatives.<\u002Fp>\n        <p style=\"font-size:14.5px;line-height:1.65;color:#3A352B;margin:0;\">Set a per-tree markup — the extra amount above the base tree price that your group keeps. Contributors pay the combined price seamlessly; Canada's Forest Trust handles tree fulfillment.<\u002Fp>\n        <p style=\"font-size:14.5px;line-height:1.65;color:#3A352B;margin:0;\">The additional funds raised above the base tree cost are separated out and <strong>returned to your organization on a monthly basis<\u002Fstrong> via direct deposit.<\u002Fp>\n        <div style=\"background:#FFF4DC;border:1px solid #E8D8AA;border-radius:3px;padding:14px 16px;\">\n          <div style=\"display:flex;align-items:flex-start;gap:9px;\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B46A3A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:2px;\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg>\n            <strong style=\"font-size:13.5px;color:#7A5C20;line-height:1.55;\">You must provide your direct deposit information in your account settings before any fundraiser funds can be disbursed to your organization.<\u002Fstrong>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeFundraiserModal }}\" style=\"align-self:flex-end;padding:10px 20px;background:#17150F;border:none;border-radius:2px;color:#F7F5EF;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-weight:700;\">Got it<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== SHELL ===================== -->\n  <div class=\"{{ shellClass }}\" style=\"flex:1;display:flex;min-height:0;\">\n\n    <!-- ---------- CONTROLS ---------- -->\n    <aside class=\"cpx-controls\" style=\"width:404px;flex:none;background:#FBFAF6;border-right:1px solid #E2DDD0;overflow-y:auto;\">\n\n      <div style=\"padding:20px 20px 16px;border-bottom:1px solid #EDE8DC;\">\n        <div class=\"cpx-mono\" style=\"font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#A39C8C;margin-bottom:7px;\">Customize<\u002Fdiv>\n        <div style=\"font-size:15px;line-height:1.45;color:#5C574B;\">Edit the panels below — your <strong style=\"color:#17150F;\">campaign page<\u002Fstrong> updates live on the right. Layout, fonts and the co-brand color:#3A352B;\">{{ sp.p }}%<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <\u002Fsc-if><sc-if value=\"{{ cardLgg }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"background:#fff;border:1px solid #E2DDD0;border-radius:3px;padding:22px 20px;grid-column:{{ lggSpan }};display:flex;flex-direction:column;\">\n              <div class=\"cpx-mono\" style=\"font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8676;margin-bottom:16px;\">Community Contributor<\u002Fdiv>\n              <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n                <img src=\"423ea7ab-1e39-4608-9f5e-04bb8a65b075\" alt=\"Canopy Partner 2026 badge\" style=\"display:block;width:100%;max-width:240px;height:auto;border-radius:2px;\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fsc-if><sc-if value=\"{{ cardMap }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"background:#fff;border:1px solid #E2DDD0;border-radius:3px;padding:22px 20px;grid-column:{{ mapSpan }};\">\n              <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;\"><div class=\"cpx-mono\" style=\"font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8676;\">Planting Locations<\u002Fdiv><div class=\"cpx-mono\" style=\"font-size:10px;color:#1B6A3E;\">{{ locCount }} sites<\u002Fdiv><\u002Fdiv>\n              <div style=\"position:relative;height:148px;border-radius:2px;overflow:hidden;background-color:#E4DECF;background-image:repeating-linear-gradient(135deg,#DBD4C2 0 9px,#E7E1D2 9px 18px);border:1px solid #DDD6C6;\">\n                <sc-for list=\"{{ locations }}\" as=\"loc\" hint-placeholder-count=\"2\">\n                  <span style=\"position:absolute;left:{{ loc.x }};top:{{ loc.y }};transform:translate( ntribute }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:38px 40px;border-bottom:1px solid #E2DDD0;background:#17150F;\">\n          <div class=\"cpx-mono\" style=\"font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#8FB39C;margin-bottom:10px;\">Plant Trees With Us<\u002Fdiv>\n          <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(26px,3.4vw,36px);line-height:1.06;letter-spacing:-0.02em;color:#F7F5EF;margin:0 0 6px;\">Add your trees to the forest.<\u002Fh2>\n          <p style=\"font-size:15px;color:#C8C3B5;margin:0 0 24px;max-width:46ch;\">Every ${{ effectivePrice }} plants one tree in {{ partnerName }}'s Smart Forest™. Choose a package and contribute in under a minute.<\u002Fp>\n\n          <div style=\"display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.15fr);gap:22px;align-items:start;\" class=\"cpx-pay-grid\">\n            <!-- packages -->\n            <div style=\"display:flex;flex-direction:column;gap:11px;\">\n              <sc-for list=\"{{ pkgPreview }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ p.on }}\" style=\"display:flex;align-items:center;justify-content:space-between;text-align:left;padding:16px 18px;border-radius:3px;cursor:pointer;border:1.5px solid {{ p.border }};background:{{ p.bg }};\">\n                  <span><span style=\"display:block;font-family:'Archivo';font-weight:800;font-size:24px;color:{{ p.titleColor }};line-height:1;\">{{ p.treesFmt }} <span style=\"font-size:14px;font-weight:600;\">trees<\u002Fspan><\u002Fspan><\u002Fspan>\n                  <span style=\"display:flex;align-items:center;gap:11px;\"><span style=\"font-family:'Archivo';font-weight:800;font-size:22px;color:{{ p.titleColor }};\">${{ p.priceFmt }}<\u002Fspan><span style=\"width:20px;height:20px;border-radius:50%;border:2px solid {{ p.dotBorder }};background:{{ p.dotBg }};flex:none;\"><\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- form -->\n            <div style=\"background:#F7F5EF;border-radius:3px;padding:22px;\">\n              <sc-if value=\"{{ payIdle }}\" hint-placeholder-val=\"{{ true }}\">\n              <div>\n                <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #E2DDD0;\">\n                  <span class=\"cpx-mono\" style=\"font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#8C8676;\">You're contributing<\u002Fspan>\n                  <span style=\"font-family:'Archivo';font-weight:800;font-size:22px;\">{{ selTreesFmt }} trees · ${{ selTotalFmt }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;\">\n                  <div><label class=\"cpx-mono\" style=\"font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#8C8676;display:block;margin-bottom:5px;\">First name<\u002Flabel><input value=\"{{ pf.first }}\" oninput=\"{{ onPayFirst }}\" style=\"width:100%;padding:10px 11px;border:1px solid {{ eb.first }};background:#fff;font-family:'Archivo';font-size:14px;border-radius:2px;outline:none;\"><\u002Fdiv>\n                  <div><label class=\"cpx-mono\" style=\"font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#8C8676;display:block;margin-bottom:5px;\">Last name<\u002Flabel><input value=\"{{ pf.last }}\" oninput=\"{{ onPayLast }}\" style=\"width:100%;padding:10px 11px;border:1px solid {{ eb.last }};background:#fff;font-family:'Archivo';font-size:14px;border-radius:2px;outline:none;\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-bottom:10px;\"><label class=\"cpx-mono\" style=\"font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#8C8676;display:block;margin-bottom:5px;\">Email · receipt sent here<\u002Flabel><input value=\"{{ pf.email }}\" oninput=\"{{ onPayEmail }}\" inputmode=\"email\" placeholder=\"name@company.com\" style=\"width:100%;padding:10px 11px;border:1px solid {{ eb.email }};background:#fff;font-family:'Archivo';font-size:14px;border-radius:2px;outline:none;\"><\u002Fdiv>\n                <div style=\"margin-bottom:14px;\"><label class=\"cpx-mono\" style=\"font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#8C8676;display:block;margin-bottom:5px;\">Card details<\u002Flabel>\n                  <input value=\"{{ pf.card }}\" oninput=\"{{ onPayCard }}\" inputmode=\"numeric\" placeholder=\"1234 1234 1234 1234\" style=\"width:100%;padding:10px 11px;border:1px solid {{ eb.card }};background:#fff;font-family:'Space Mono',monospace;font-size:13.5px;border-radius:2px 2px 0 0;outline:none;border-bottom:none;\">\n                  <div style=\"display:flex;\"><input value=\"{{ pf.exp }}\" oninput=\"{{ onPayExp }}\" inputmode=\"numeric\" placeholder=\"MM/YY\" style=\"width:50%;padding:10px 11px;border:1px solid {{ eb.exp }};background:#fff;font-family:'Space Mono',monospace;font-size:13.5px;border-radius:0 0 0 2px;outline:none;border-right:none;\"><input value=\"{{ pf.cvc }}\" oninput=\"{{ onPayCvc }}\" inputmode=\"numeric\" placeholder=\"CVC\" style=\"width:50%;padding:10px 11px;border:1px solid {{ eb.cvc }};background:#fff;font-family:'Space Mono',monospace;font-size:13.5px;border-radius:0 0 2px 0;outline:none;\"><\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ submitPay }}\" style=\"width:100%;padding:14px;background:#1B6A3E;border:none;border-radius:2px;color:#fff;font-family:'Archivo';font-weight:700;font-size:15px;cursor:pointer;letter-spacing:0.01em;\">Contribute {{ selTreesFmt }} trees · ${{ selTotalFmt }}<\u002Fbutton>\n                <div style=\"display:flex;align-items:center;justify-content:center;gap:6px;margin-top:11px;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A39C8C\" stroke-width=\"2\"><rect x=\"4\" y=\"10\" width=\"16\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M8 10V7a4 4 0 018 0v3\"><\u002Fpath><\u002Fsvg><span class=\"cpx-mono\" style=\"font-size:9.5px;letter-spacing:0.06em;color:#A39C8C;text-transform:uppercase;\">Secure payments through Stripe<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ payProcessing }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;\">\n                <span style=\"width:34px;height:34px;border:3px solid #E2DDD0;border-top-color:#1B6A3E;border-radius:50%;display:block;animation:cpx-spin 0.8s linear infinite;\"><\u002Fspan>\n                <span class=\"cpx-mono\" style=\"font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8C8676;\">Processing payment…<\u002Fspan>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ payDone }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;padding:10px;\">\n                <span style=\"width:50px;height:50px;border-radius:50%;background:#1B6A3E;display:flex;align-items:center;justify-content:center;margin-bottom:6px;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <div style=\"font-family:'Archivo';font-weight:800;font-size:24px;letter-spacing:-0.01em;\">Thank you, {{ paidName }}!<\u002Fdiv>\n                <div style=\"font-size:15px;color:#3A352B;max-width:34ch;line-height:1.5;\">You just planted <strong>{{ paidTrees }} trees<\u002Fstrong>. A receipt for <strong>${{ paidTotal }}<\u002Fstrong> is on its way to <strong>{{ paidEmail }}<\u002Fstrong>.<\u002Fdiv>\n                <div class=\"cpx-mono\" style=\"font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#8C8676;margin-top:6px;\">The forest's tree count has been updated.<\u002Fdiv>\n                <button onclick=\"{{ resetPay }}\" style=\"margin-top:14px;padding:11px 18px;background:transparent;border:1px solid #1B6A3E;border-radius:2px;color:#1B6A3E;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;\">Make another contribution<\u002Fbutton>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- BOTTOM CTA -->\n        <div style=\"padding:54px 40px 58px;text-align:center;background:#F7F5EF;\">\n          <div class=\"cpx-mono\" style=\"font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:#B46A3A;margin-bottom:16px;\">Start Your Own<\u002Fdiv>\n          <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(26px,3.6vw,40px);line-height:1.05;letter-spacing:-0.02em;margin:0 auto 22px;max-width:18ch;text-wrap:balance;\">Bring a Smart Forest™ to your brand.<\u002Fh2>\n          <a href=\"https://www.canadasforesttrust.ca/contact\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:10px;background:#1B6A3E;color:#F7F5EF;font-family:'Archivo';font-weight:700;font-size:16px;text-decoration:none;padding:15px 28px;border-radius:2px;\">Contact Canada's Forest Trust <span style=\"font-size:18px;\">→<\u002Fspan><\u002Fa>\n          <div style=\"margin-top:34px;padding-top:20px;border-top:1px solid #E2DDD0;display:flex;align-items:center;justify-content:center;gap:9px;\">\n            <div style=\"display:grid;grid-template-columns:repeat(5,2.5px);gap:1.5px;\"><sc-for list=\"{{ cftDots }}\" as=\"d\" hint-placeholder-count=\"25\"><span style=\"width:2.5px;height:2.5px;border-radius:50%;background:#A39C8C;display:block;\"><\u002Fspan><\u002Fsc-for><\u002Fdiv>\n            <span class=\"cpx-mono\" style=\"font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#A39C8C;\">© 2026 Canada's Forest Trust Corporation<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;partnerName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ABC Corporation&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;partnerInitials&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;SP&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;treePrice&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:6,&quot;min&quot;:1,&quot;max&quot;:50,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this._editorEl = null;\n    const partner = (props && props.partnerName) || \"ABC Corporation\";\n    this.state = {\n      mobileTab:'edit', fullPreview:false, published:false, openSection:'heading',\n      shareOpen:false, copiedLink:false, copiedEmbed:false,\n      headingText:'Grow a forest with '+partner,\n      subheadingText:'Every tree you contribute is planted in a real Canadian Smart Forest™ and tracked for life — restoring habitat, capturing carbon, and rebuilding biodiversity for generations.',\n      headingBg:'#17150F', headingColor:'#F7F5EF', heroImage:null,\n      cards:{carbon:true, trees:true, map:true, species:true, lgg:true},\n      speciesOpen:false,\n      highlightActive:true, highlightSource:false,\n      highlightHtml:'<h3>Why we planted in Lockstead<\u002Fh3><p>Our 2026 campaign restores boreal habitat across New Brunswick. Watch the story from our first planting season — and see what 6,000 seedlings really looks like on the ground.<\u002Fp>',\n      contributeActive:true, fundraiserActive:false, fundraiserMarkup:'', fundraiserModalOpen:false,\n      packages:[1,5,10],\n      selectedPkg:1,\n      pf:{first:'',last:'',email:'',card:'',exp:'',cvc:''},\n      payStatus:'idle', payErrors:{},\n      paid:{name:'',trees:0,total:0,email:''},\n      trees:1000\n    };\n  }\n\n  refEditor = (node)=>{\n    this._editorEl = node;\n    if(node && !this.state.highlightSource && document.activeElement !== node && node.innerHTML !== this.state.highlightHtml){\n      node.innerHTML = this.state.highlightHtml;\n    }\n  };\n\n  fmt(n){ return Number(n).toLocaleString('en-US'); }\n  hexToRgba(hex,a){\n    let h = (hex||'').replace('#','').trim();\n    if(h.length===3){ h = h.split('').map(c=>c+c).join(''); }\n    if(h.length!==6 || /[^0-9a-fA-F]/.test(h)) return 'rgba(0,0,0,'+a+')';\n    const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);\n    return 'rgba('+r+','+g+','+b+','+a+')';\n  }\n  setField(k,v){ this.setState({[k]:v}); }\n\n  // rich text\n  exec(c,v){ try{ document.execCommand(c,false,v); }catch(e){} this.syncEditor(); if(this._editorEl) this._editorEl.focus(); }\n  syncEditor(){ if(this._editorEl) this.setState({highlightHtml:this._editorEl.innerHTML}); }\n  linkCmd(){ const u=window.prompt('Link URL','https://'); if(u) this.exec('createLink',u); }\n  imgCmd(){ const u=window.prompt('Image URL (https://…)','https://'); if(u) this.exec('insertHTML','<img src=\"'+u+'\" alt=\"\">'); }\n  videoCmd(){ const u=window.prompt('Video URL — YouTube, Vimeo or .mp4',''); if(!u) return; this.exec('insertHTML', this.toEmbed(u)); }\n  toEmbed(u){\n    let id=null, m;\n    if((m=u.match(/(?:youtube\\.com\\/watch\\?v=|youtu\\.be\\/|youtube\\.com\\/embed\\/)([\\w-]{6,})/))) id=m[1];\n    if(id) return '<div style=\"position:relative;padding-top:56.25%;margin:12px 0;\"><iframe src=\"https://www.youtube.com/embed/'+id+'\" style=\"position:absolute;inset:0;width:100%;height:100%;border:0;\" allowfullscreen><\u002Fiframe><\u002Fdiv>';\n    if((m=u.match(/vimeo\\.com\\/(\\d+)/))) return '<div style=\"position:relative;padding-top:56.25%;margin:12px 0;\"><iframe src=\"https://player.vimeo.com/video/'+m[1]+'\" style=\"position:absolute;inset:0;width:100%;height:100%;border:0;\" allowfullscreen><\u002Fiframe><\u002Fdiv>';\n    if(/\\.mp4($|\\?)/i.test(u)) return '<video src=\"'+u+'\" controls style=\"width:100%;margin:12px 0;\"><\u002Fvideo>';\n    return '<p><a href=\"'+u+'\" target=\"_blank\" rel=\"noopener\">'+u+'<\u002Fa><\u002Fp>';\n  }\n  toggleSource(){\n    if(!this.state.highlightSource){\n      const html = this._editorEl ? this._editorEl.innerHTML : this.state.highlightHtml;\n      this.setState({highlightSource:true, highlightHtml:html});\n    } else { this.setState({highlightSource:false}); }\n  }\n\n  // packages\n  changePkg(i, val){ this.setState(s=>{ const p=s.packages.slice(); p[i]=Math.max(1,Math.min(99999, val||1)); return {packages:p}; }); }\n  addPackage(){ this.setState(s=> s.packages.length>=5 ? {} : {packages:[...s.packages, (s.packages[s.packages.length-1]||5)*2]}); }\n  removePackage(i){ this.setState(s=>{ if(s.packages.length<=1) return {}; const p=s.packages.slice(); p.splice(i,1); let sel=s.selectedPkg; if(sel>=p.length) sel=p.length-1; return {packages:p, selectedPkg:sel}; }); }\n\n  // payment\n  setPf(k,v){ this.setState(s=>({pf:{...s.pf,[k]:v}})); }\n  submitPay(){\n    const pf=this.state.pf, e={};\n    if(!pf.first.trim()) e.first=1;\n    if(!pf.last.trim()) e.last=1;\n    if(!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(pf.email)) e.email=1;\n    if(pf.card.replace(/\\s/g,'').length<15) e.card=1;\n    if(!/^\\d{2}\\/\\d{2}$/.test(pf.exp)) e.exp=1;\n    if(pf.cvc.length<3) e.cvc=1;\n    if(Object.keys(e).length){ this.setState({payErrors:e}); return; }\n    this.setState({payStatus:'processing', payErrors:{}});\n    const baseP = this.props.treePrice ?? 6;\n    const mkup = this.state.fundraiserActive ? Math.max(0, Math.min(100, parseFloat(this.state.fundraiserMarkup)||0)) : 0;\n    const effP = baseP + mkup;\n    setTimeout(()=>{\n      this.setState(s=>{\n        const trees = s.packages[s.selectedPkg] || 1;\n        return { payStatus:'done', trees: s.trees + trees,\n          paid:{ name:s.pf.first, trees:trees, total:trees*effP, email:s.pf.email } };\n      });\n    }, 1500);\n  }\n  resetPay(){ this.setState({payStatus:'idle', payErrors:{}, pf:{first:'',last:'',email:'',card:'',exp:'',cvc:''}}); }\n\n  // share\n  copyText(text, flag){\n    const done=()=>{ this.setState({[flag]:true}); setTimeout(()=>this.setState({[flag]:false}), 1800); };\n    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done, ()=>this.fallbackCopy(text,done)); }\n    else { this.fallbackCopy(text, done); }\n  }\n  fallbackCopy(text, done){\n    try{ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); }catch(e){}\n  }\n\n  // hero\n  readHero(f){ if(!f || !/^image\\//.test(f.type)) return; const r=new FileReader(); r.onload=()=>this.setField('heroImage', r.result); r.readAsDataURL(f); }\n\n  renderVals(){\n    const s = this.state;\n    const partner = this.props.partnerName ?? 'ABC Corporation';\n    const price = this.props.treePrice ?? 6;\n    const SW_BG = ['#17150F','#1B6A3E','#B46A3A','#2E4A3A','#3A2E1F','#F7F5EF','#FFFFFF'];\n    const SW_FONT = ['#F7F5EF','#FFFFFF','#17150F','#1B6A3E','#B46A3A'];\n    const SPECIES = [\n      {n:'White Spruce',p:35,color:'#1B6A3E'},\n      {n:'Black Spruce',p:25,color:'#2E4A3A'},\n      {n:'Jack Pine',p:18,color:'#17150F'},\n      {n:'Tamarack',p:12,color:'#B46A3A'},\n      {n:'Balsam Fir',p:10,color:'#8C8676'}\n    ];\n    const LOC = [\n      {name:'Porter Cove', trees:'6,000', co2:'748.5 kg', x:'62%', y:'38%'},\n      {name:'Doakdown', trees:'3,000', co2:'61.3 kg', x:'44%', y:'66%'}\n    ];\n\n    const eq = (a,b)=> (a||'').toLowerCase() === (b||'').toLowerCase();\n    const bgSwatches = SW_BG.map(c=>({ c, ring: eq(c,s.headingBg)?'#1B6A3E':'transparent', on:()=>this.setField('headingBg',c) }));\n    const fontSwatches = SW_FONT.map(c=>({ c, ring: eq(c,s.headingColor)?'#1B6A3E':'#EDE8DC', on:()=>this.setField('headingColor',c) }));\n\n    const cardDefs = [\n      {key:'carbon', label:'Carbon sequestered', desc:'Total CO₂ captured to date'},\n      {key:'trees',  label:'Trees contributed', desc:'Live count — updates with each gift'},\n      {key:'map',    label:'Planting locations', desc:'Map of your forest sites'},\n      {key:'species',label:'Species planted', desc:'Expandable species breakdown'},\n      {key:'lgg',    label:'LGG Badge', desc:'Your Canopy Partner recognition badge'}\n    ];\n    const cardRows = cardDefs.map(d=>{\n      const active = s.cards[d.key];\n      return { label:d.label, desc:d.desc, active,\n        border: active?'#1B6A3E':'#E2DDD0', bg: active?'#F0F4F0':'#fff',\n        boxBorder: active?'#1B6A3E':'#CFC8B8', boxBg: active?'#1B6A3E':'#fff',\n        check: active?'✓':'',\n        onToggle:()=>this.setState(st=>({cards:{...st.cards,[d.key]:!st.cards[d.key]}})) };\n    });\n\n    const richDefs = [\n      {t:'B', title:'Bold', cmd:()=>this.exec('bold'), weight:'700', fstyle:'normal', deco:'none'},\n      {t:'I', title:'Italic', cmd:()=>this.exec('italic'), weight:'400', fstyle:'italic', deco:'none'},\n      {t:'U', title:'Underline', cmd:()=>this.exec('underline'), weight:'400', fstyle:'normal', deco:'underline'},\n      {t:'H', title:'Heading', cmd:()=>this.exec('formatBlock','<h3>'), weight:'700', fstyle:'normal', deco:'none'},\n      {t:'• List', title:'Bullet list', cmd:()=>this.exec('insertUnorderedList'), weight:'400', fstyle:'normal', deco:'none'},\n      {t:'Link', title:'Insert link', cmd:()=>this.linkCmd(), weight:'400', fstyle:'normal', deco:'none'},\n      {t:'Photo', title:'Insert image', cmd:()=>this.imgCmd(), weight:'400', fstyle:'normal', deco:'none'},\n      {t:'Video', title:'Embed video', cmd:()=>this.videoCmd(), weight:'400', fstyle:'normal', deco:'none'}\n    ];\n    const richButtons = richDefs.map(b=>({ ...b, onMouseDown:(e)=>{ e.preventDefault(); b.cmd(); } }));\n\n    const markup = s.fundraiserActive ? Math.max(0, Math.min(100, parseFloat(s.fundraiserMarkup)||0)) : 0;\n    const effectivePrice = price + markup;\n\n    const packageRows = s.packages.map((t,i)=>({\n      num:i+1, trees:t, price:this.fmt(t*effectivePrice),\n      removeOpacity: s.packages.length>1 ? '1':'0.3',\n      onInput:(e)=>{ const v=parseInt((e.target.value||'').replace(/\\D/g,''),10); this.changePkg(i, isNaN(v)?1:v); },\n      inc:()=>this.changePkg(i, t+1), dec:()=>this.changePkg(i, t-1),\n      remove:()=>this.removePackage(i)\n    }));\n\n    const pkgPreview = s.packages.map((t,i)=>{\n      const sel = i===s.selectedPkg;\n      return { treesFmt:this.fmt(t), priceFmt:this.fmt(t*effectivePrice), co2:(t*0.80973).toFixed(1),\n        border: sel?'#1B6A3E':'rgba(247,245,239,0.2)', bg: sel?'#F7F5EF':'rgba(247,245,239,0.05)',\n        titleColor: sel?'#17150F':'#F7F5EF', subColor: sel?'#8C8676':'#9AA89F',\n        dotBorder: sel?'#1B6A3E':'#7E8A82', dotBg: sel?'#1B6A3E':'transparent',\n        on:()=>this.setField('selectedPkg',i) };\n    });\n\n    const selTrees = s.packages[s.selectedPkg] || 0;\n    const selTotal = selTrees * effectivePrice;\n    const carbon = s.trees * 0.80973;\n    const eb = (f)=> s.payErrors[f] ? '#B4453A' : '#D9D3C5';\n\n    const heroBgCss = s.heroImage\n      ? 'linear-gradient('+this.hexToRgba(s.headingBg,0.52)+','+this.hexToRgba(s.headingBg,0.66)+'), url(\"'+s.heroImage+'\") center/cover no-repeat'\n      : s.headingBg;\n    const heroLight = (()=>{ // kicker color: tinted version of font color\n      return this.hexToRgba(s.headingColor,0.7);\n    })();\n\n    return {\n      cftDots: Array(25).fill(0),\n
